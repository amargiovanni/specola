name: Specola
options:
  bundleIdPrefix: com.oltrematica
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "16.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "14.0"

targets:
  Specola:
    type: application
    platform: macOS
    sources:
      - path: Specola
    preBuildScripts:
      - script: |
          # Bundle Python engine into app Resources
          ENGINE_SRC="${PROJECT_DIR}/engine"
          ENGINE_DST="${BUILT_PRODUCTS_DIR}/${PRODUCT_NAME}.app/Contents/Resources/engine"
          rm -rf "$ENGINE_DST"
          mkdir -p "$ENGINE_DST/src"
          cp "$ENGINE_SRC/specola_engine.py" "$ENGINE_DST/"
          cp "$ENGINE_SRC/requirements.txt" "$ENGINE_DST/"
          cp "$ENGINE_SRC/setup_engine.sh" "$ENGINE_DST/"
          cp "$ENGINE_SRC/src/__init__.py" "$ENGINE_DST/src/"
          cp "$ENGINE_SRC/src/feed_fetcher.py" "$ENGINE_DST/src/"
          cp "$ENGINE_SRC/src/prompt_builder.py" "$ENGINE_DST/src/"
          cp "$ENGINE_SRC/src/analyzer.py" "$ENGINE_DST/src/"
          cp "$ENGINE_SRC/src/doc_generator.py" "$ENGINE_DST/src/"
          chmod +x "$ENGINE_DST/setup_engine.sh"
        name: Bundle Python Engine
    dependencies:
      - target: SpecolaWidgetExtension
    settings:
      base:
        INFOPLIST_FILE: Specola/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.oltrematica.specola
        PRODUCT_NAME: Specola
        CODE_SIGN_ENTITLEMENTS: Specola/Specola.entitlements
        ENABLE_APP_SANDBOX: false
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon

  SpecolaWidgetExtension:
    type: app-extension
    platform: macOS
    sources:
      - path: SpecolaWidget
    dependencies:
      - sdk: WidgetKit.framework
      - sdk: SwiftUI.framework
    settings:
      base:
        INFOPLIST_FILE: SpecolaWidget/Info.plist
        GENERATE_INFOPLIST_FILE: "YES"
        CODE_SIGN_ENTITLEMENTS: SpecolaWidget/SpecolaWidget.entitlements
        PRODUCT_BUNDLE_IDENTIFIER: com.oltrematica.specola.widget
        PRODUCT_NAME: SpecolaWidgetExtension
        SWIFT_VERSION: "5.9"
        MACOSX_DEPLOYMENT_TARGET: "14.0"
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        LD_RUNPATH_SEARCH_PATHS: "$(inherited) @executable_path/../Frameworks @executable_path/../../../../Frameworks"

  SpecolaTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: SpecolaTests
    dependencies:
      - target: Specola
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.oltrematica.specola.tests
        GENERATE_INFOPLIST_FILE: YES
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/Specola.app/Contents/MacOS/Specola"
        BUNDLE_LOADER: "$(TEST_HOST)"
